<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION PRIME [V4 Minimalist]</title>
    <link rel="stylesheet" href="style.css?v=4">
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body>
    
    <!-- Fullscreen Network Background -->
    <div id="network-container" class="network-bg"></div>

    <!-- Floating HUD Overlay -->
    <div class="hud-overlay">
        
        <!-- Left Panel -->
        <div class="floating-panel left-panel">
            <header>
                <h1>AION PRIME</h1>
                <p class="subtitle">THERMODYNAMIC OBSERVATORY [V4]</p>
                <div class="status-indicator">
                    <span class="pulse-dot"></span>
                    <span id="ws-status" class="text-teal">LINK SECURE</span>
                </div>
            </header>
            
            <div class="widget spacer-top">
                <div class="widget-header">
                    <h2>DYNAMIC CLOCK</h2>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="volume-progress" style="width: 0%;"></div>
                </div>
                <p class="metric-value text-teal" id="volume-text">Awaiting Ticks...</p>
            </div>

            <div class="widget" style="margin-top: auto;">
                <div class="widget-header">
                    <h2>TENSION TRACKER <span class="badge">TOP 3</span></h2>
                </div>
                <div id="top-nodes-list" class="minimal-list">
                    <div class="empty-state">Calibrating...</div>
                </div>
            </div>
        </div>

        <!-- Right Panel -->
        <div class="floating-panel right-panel">
            <div class="widget">
                <div class="widget-header">
                    <h2>KDE TOPOLOGY <span class="badge" id="kde-subtitle">SELECT NODE</span></h2>
                </div>
                <div class="chart-container">
                    <canvas id="kdeChart"></canvas>
                </div>
            </div>

            <div class="widget">
                <div class="widget-header">
                    <h2><span id="ledger-type">SHADOW</span> LEDGER <span class="badge" id="shadow-balance">$200.00</span></h2>
                </div>
                <div id="shadow-active" class="minimal-list spacer-bottom">
                    <div class="empty-state">NO ACTIVE TRADES</div>
                </div>
            </div>

            <div class="widget">
                <div class="widget-header">
                    <h2>SINGULARITY LOG <span class="badge" id="event-count">0</span></h2>
                </div>
                <div id="event-feed" class="minimal-list">
                    <div class="empty-state">DORMANT.</div>
                </div>
            </div>
        </div>

    </div>

    <!-- Engine logic -->
    <script src="engine.js?v=4"></script>
</body>
</html>
